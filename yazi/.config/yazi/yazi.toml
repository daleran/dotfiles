# Save this file to: ~/.config/yazi/yazi.toml
 
[mgr]
ratio         = [0, 1, 2]    # No parent pane, big preview for reading files
sort_by       = "natural"
sort_dir_first = true
show_hidden   = true          # See .gitignore, .env, etc.
show_symlink  = true
 
[preview]
wrap          = "yes"         # Wrap long lines in preview (great for markdown)
tab_size      = 4
max_width     = 600
max_height    = 900
 
[opener]
edit = [
    { run = 'nvim "$@"', block = true, desc = "Neovim", for = "unix" },
]
chrome = [
    { run = 'google-chrome "$@"', desc = "Chrome", for = "unix" },
]
nautilus = [
    { run = 'nautilus "$@"', desc = "Nautilus", for = "unix" },
]

[open]
rules = [
    { mime = "text/html",       use = ["chrome", "edit"] },
    { name = "*.html",          use = ["chrome", "edit"] },
    { mime = "inode/directory", use = ["nautilus"] },
]
 
