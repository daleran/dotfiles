    <style>
        :root {
            --primary: #000;
            --bg-gray: #f2f2f2;
            --border: #ccc;
            --text: #000;
            --key-bg: #eee;
        }

        @page {
            size: A4 portrait;
            margin: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 9.5px;
            line-height: 1.25;
            color: var(--text);
            margin: 0;
            background: #fff;
        }

        .page {
            width: 210mm;
            height: 297mm;
            padding: 10mm;
            box-sizing: border-box;
            column-count: 2;
            column-gap: 8mm;
            page-break-after: always;
            position: relative;
            overflow: hidden;
        }

        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .page {
                width: 210mm;
                height: 297mm;
                margin: 0;
                padding: 10mm;
            }
        }

        .section-group {
            break-inside: avoid;
            margin-bottom: 10px;
        }

        h1 {
            column-span: all;
            text-align: center;
            font-size: 18px;
            margin: 0 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 3px solid #000;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h2 {
            background: #000;
            color: #fff;
            font-size: 10px;
            padding: 4px 8px;
            margin: 0 0 5px 0;
            text-transform: uppercase;
        }

        h3 {
            font-size: 8.5px;
            text-transform: uppercase;
            margin: 6px 0 3px 0;
            border-bottom: 1px solid #000;
            font-weight: 800;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 4px;
        }

        td {
            padding: 2px 4px;
            vertical-align: top;
            border-bottom: 0.5px solid var(--border);
        }

        td:first-child {
            width: 38%;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-weight: 700;
        }

        .note {
            font-size: 8.5px;
            font-style: italic;
            padding: 4px;
            background: var(--bg-gray);
            border: 1px solid #000;
            margin-top: 3px;
        }

        code {
            font-family: monospace;
            background: var(--key-bg);
            padding: 0 2px;
            border: 0.5px solid #000;
        }
    </style>
</head>

<body>

    <div id="content"></div>

    <script>
        function renderTable(content) {
            let html = '<table>';
            content.forEach(row => {
                html += `<tr><td>${row[0]}</td><td>${row[1]}</td></tr>`;
            });
            html += '</table>';
            return html;
        }

        function renderSection(section) {
            let html = `<div class="section-group">`;
            html += `<h2>${section.title}</h2>`;

            if (section.type === 'table') {
                html += renderTable(section.content);
            } else if (section.type === 'group') {
                if (section.note) html += `<div class="note">${section.note}</div>`;
                section.sections.forEach(s => {
                    html += `<h3>${s.subtitle}</h3>`;
                    html += renderTable(s.content);
                });
            }

            if (section.note && section.type !== 'group') {
                html += `<div class="note">${section.note}</div>`;
            }

            html += `</div>`;
            return html;
        }

        function renderPage(sideKey, title) {
            let html = `<div class="page"><h1>${title}</h1>`;
            cheatsheetData[sideKey].forEach(section => {
                html += renderSection(section);
            });
            html += `</div>`;
            return html;
        }

        document.getElementById('content').innerHTML =
            renderPage('side1', 'Vim Core & Editing') +
            renderPage('side2', 'Navigation & Environment');
    </script>

</body>

</html>
