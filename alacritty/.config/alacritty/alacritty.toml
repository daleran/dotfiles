[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

[window]
decorations = "none"
startup_mode = "Maximized"

[font]
size = 12.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[colors.primary]
background = "#0a0e14"
foreground = "#b3b1ad"

[colors.normal]
black   = "#0a0e14"
red     = "#f07178"
green   = "#aad94c"
yellow  = "#e6b450"
blue    = "#59c2ff"
magenta = "#d2a6ff"
cyan    = "#39bae6"
white   = "#b3b1ad"

[colors.bright]
black   = "#4d5566"
red     = "#f07178"
green   = "#aad94c"
yellow  = "#e6b450"
blue    = "#59c2ff"
magenta = "#d2a6ff"
cyan    = "#39bae6"
white   = "#e6e1cf"
