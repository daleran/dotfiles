    <style>
        :root {
            --primary: #000;
            --bg-gray: #f2f2f2;
            --border: #ccc;
            --text: #000;
            --key-bg: #eee;
        }

        @page {
            size: A4 portrait;
            margin: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 9.1px;
            line-height: 1.22;
            color: var(--text);
            margin: 0;
            background: #fff;
        }

        .page {
            width: 210mm;
            height: 297mm;
            padding: 8mm;
            box-sizing: border-box;
            column-count: 2;
            column-gap: 8mm;
            page-break-after: always;
            position: relative;
            overflow: hidden;
        }

        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .page { width: 210mm; height: 297mm; margin: 0; padding: 8mm; }
        }

        .section-group {
            break-inside: avoid;
            margin-bottom: 7px;
        }

        h1 {
            column-span: all;
            text-align: center;
            font-size: 16px;
            margin: 0 0 6px 0;
            padding-bottom: 4px;
            border-bottom: 2.5px solid #000;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h2 {
            background: #000;
            color: #fff;
            font-size: 9.5px;
            padding: 3px 6px;
            margin: 0 0 4px 0;
            text-transform: uppercase;
        }

        h3 {
            font-size: 8px;
            text-transform: uppercase;
            margin: 4px 0 2px 0;
            border-bottom: 0.8px solid #000;
            font-weight: 800;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 2px;
        }

        td {
            padding: 1.2px 3px;
            vertical-align: top;
            border-bottom: 0.5px solid var(--border);
        }

        td:first-child {
            width: 38%;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-weight: 700;
        }

        .note {
            font-size: 8px;
            font-style: italic;
            padding: 2.5px;
            background: var(--bg-gray);
            border: 0.8px solid #000;
            margin-top: 2px;
        }

        code {
            font-family: monospace;
            background: var(--key-bg);
            padding: 0 1.5px;
            border: 0.5px solid #000;
        }
    </style>
</head>
<body>

<div id="content"></div>

<script>
    function renderTable(content) {
        let html = '<table>';
        content.forEach(row => {
            html += `<tr><td>${row[0]}</td><td>${row[1]}</td></tr>`;
        });
        html += '</table>';
        return html;
    }

    function renderSection(section) {
        let html = `<div class="section-group">`;
        html += `<h2>${section.title}</h2>`;

        if (section.type === 'table') {
            html += renderTable(section.content);
        } else if (section.type === 'group') {
            if (section.note) html += `<div class="note">${section.note}</div>`;
            section.sections.forEach(s => {
                html += `<h3>${s.subtitle}</h3>`;
                html += renderTable(s.content);
            });
        }

        if (section.note && section.type !== 'group') {
            html += `<div class="note">${section.note}</div>`;
        }

        html += `</div>`;
        return html;
    }

    function renderPage(sideKey, title) {
        let html = `<div class="page"><h1>${title}</h1>`;
        cheatsheetData[sideKey].forEach(section => {
            html += renderSection(section);
        });
        html += `</div>`;
        return html;
    }

    document.getElementById('content').innerHTML =
        renderPage('side1', 'Vim Core & Editing') +
        renderPage('side2', 'Navigation & Environment');
</script>

</body>
</html>
